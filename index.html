<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MultiPlay">
<meta name="theme-color" content="#0d0d1a">
<title>MultiPlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d1a;--surface:#13132b;--card:#1a1a35;--elevated:#21214a;
  --accent:#8b5cf6;--accent-dim:#6d44c7;--accent-glow:rgba(139,92,246,.15);--accent2:#c084fc;
  --txt:#f0eeff;--txt2:#9d96cc;--muted:#5c5880;
  --border:rgba(139,92,246,.2);--border-b:rgba(139,92,246,.5);
  --ok:#34d399;--err:#f87171;--warn:#fbbf24;--red:#ef4444;
  --font-d:'Rajdhani',sans-serif;--font:'Inter',sans-serif;
  --r:12px;--rs:8px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .5s}
#splash.out{opacity:0;pointer-events:none}
.splash-logo{display:flex;flex-direction:column;align-items:center;gap:12px}
.splash-icon{font-size:60px;color:var(--accent);animation:pg 1.2s ease-in-out infinite}
.splash-logo span{font-family:var(--font-d);font-size:34px;font-weight:700;letter-spacing:3px}
@keyframes pg{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.92)}}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}
#app.hidden{display:none}
.top-bar{background:var(--surface);border-bottom:1px solid var(--border);padding-top:max(var(--st),12px);flex-shrink:0}
.app-title{font-family:var(--font-d);font-size:22px;font-weight:700;color:var(--accent2);padding:0 16px 8px;letter-spacing:2px}
.play-icon{color:var(--accent2)}
.tab-nav{display:flex;border-top:1px solid var(--border)}
.tab-btn{flex:1;background:none;border:none;cursor:pointer;padding:10px 4px;font-family:var(--font);font-size:12px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-content{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:calc(20px + var(--sb));-webkit-overflow-scrolling:touch}
.tab-content.hidden{display:none!important}

/* HEADERS */
.section-header{padding:14px 16px 6px;display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.section-header.col{flex-direction:column;align-items:stretch}
.section-header h2{font-family:var(--font-d);font-size:20px;font-weight:600;letter-spacing:1px}
.date-display{font-size:11px;color:var(--txt2);background:var(--card);padding:4px 10px;border-radius:20px;border:1px solid var(--border)}

/* PILLS */
.league-pills,.genre-pills{display:flex;gap:6px;overflow-x:auto;padding:6px 16px 10px;scrollbar-width:none}
.league-pills::-webkit-scrollbar,.genre-pills::-webkit-scrollbar{display:none}
.pill{background:var(--card);border:1px solid var(--border);color:var(--txt2);border-radius:20px;padding:5px 14px;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;transition:all .2s;font-family:var(--font)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* MATCHES */
.matches-list{padding:6px 16px;display:flex;flex-direction:column;gap:8px}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;transition:border-color .2s}
.match-card.live{border-color:var(--red)}
.match-card.done{opacity:.72}
.mc-league{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.live-dot{background:var(--red);color:#fff;font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.mc-body{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.mc-team{flex:1;font-size:13px;font-weight:600;line-height:1.2}
.mc-team.r{text-align:right}
.mc-score{background:var(--elevated);border-radius:var(--rs);padding:6px 10px;text-align:center;min-width:60px;flex-shrink:0}
.mc-score-val{font-family:var(--font-d);font-size:20px;font-weight:700}
.mc-score-sub{font-size:10px;color:var(--txt2);margin-top:1px}
.mc-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.mc-time-cl{font-size:11px;color:var(--accent2);font-weight:600;background:var(--accent-glow);border:1px solid var(--border-b);padding:3px 9px;border-radius:6px}
.btn-remind{margin-left:auto;background:none;border:1px solid var(--border-b);color:var(--accent);border-radius:6px;font-size:11px;padding:4px 10px;cursor:pointer;font-family:var(--font);white-space:nowrap;transition:all .2s}
.btn-remind.on{color:var(--ok);border-color:var(--ok)}
.loading-block{display:flex;flex-direction:column;align-items:center;padding:48px 20px;gap:12px;color:var(--muted)}
.spinner{width:30px;height:30px;border:2px solid var(--elevated);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* IPTV */
.iptv-tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.iptv-tab{flex:1;background:none;border:none;cursor:pointer;padding:11px 4px;font-family:var(--font);font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:all .2s}
.iptv-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.video-wrap{position:relative;background:#000;width:100%;aspect-ratio:16/9}
#iptv-video,#anime-video{width:100%;height:100%;display:block}
.v-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:var(--bg);color:var(--muted)}
.ph-icon{font-size:40px}
.nowplaying{display:flex;align-items:center;gap:12px;padding:11px 16px;background:var(--surface);border-bottom:1px solid var(--border)}
.np-logo{width:40px;height:40px;background:var(--accent-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:10px;font-weight:700;color:#fff;flex-shrink:0;text-align:center;word-break:break-all;padding:2px}
.np-info{flex:1;min-width:0}
.np-name{font-weight:600;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.np-live{font-size:10px;color:var(--red);font-weight:600;letter-spacing:1px;margin-top:2px}
.np-stop{background:none;border:1px solid var(--border-b);color:var(--err);border-radius:6px;font-size:11px;padding:5px 10px;cursor:pointer;font-family:var(--font);flex-shrink:0}
.ip-error{padding:14px 16px;background:rgba(248,113,113,.08);border-top:1px solid rgba(248,113,113,.25);color:var(--err);font-size:13px;text-align:center;line-height:1.6}
.ch-search-wrap{padding:10px 16px 4px}
.search-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--txt);padding:10px 13px;font-family:var(--font);font-size:14px;outline:none}
.search-input:focus{border-color:var(--border-b)}
.search-input::placeholder{color:var(--muted)}
.ch-list{padding:8px 16px;display:flex;flex-direction:column;gap:8px}
.ch-card{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;cursor:pointer;transition:border-color .2s}
.ch-card:active{border-color:var(--border-b)}
.ch-logo{width:46px;height:46px;flex-shrink:0;background:var(--accent-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:10px;font-weight:700;color:#fff;text-align:center;word-break:break-all;padding:3px}
.ch-info{flex:1;min-width:0;cursor:pointer}
.ch-name{font-weight:600;font-size:14px;margin-bottom:2px}
.ch-url{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-play-ch{background:var(--accent);border:none;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;font-size:15px;color:#fff;transition:transform .1s}
.btn-play-ch:active{transform:scale(.88)}
.empty-state{display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:40px}
.form-card{padding:16px;border-bottom:1px solid var(--border)}
.form-card h3{font-family:var(--font-d);font-size:16px;font-weight:600;color:var(--accent2);margin-bottom:13px;letter-spacing:1px}
.lbl{display:block;font-size:11px;color:var(--txt2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.form-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--txt);padding:11px 13px;font-family:var(--font);font-size:14px;outline:none;margin-bottom:10px;display:block}
.form-input:focus{border-color:var(--border-b)}
.form-row{display:flex;gap:8px}
.btn-primary{background:var(--accent);border:none;border-radius:var(--rs);color:#fff;padding:11px 20px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:background .2s}
.btn-primary:active{background:var(--accent-dim)}
.btn-sec{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);color:var(--txt2);padding:11px 14px;font-family:var(--font);font-size:14px;cursor:pointer}
.saved-ch{display:flex;align-items:center;gap:8px;background:var(--elevated);border-radius:var(--rs);padding:10px 12px;margin-bottom:8px}
.saved-ch-name{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.icon-btn{background:none;border:1px solid var(--border);color:var(--txt2);border-radius:6px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0;transition:all .2s}
.icon-btn:active{background:var(--card)}
.hint{font-size:12px;color:var(--muted);text-align:center;padding:10px 0}

/* ANIME GRID */
.anime-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;padding:14px 16px}
.anime-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .15s,border-color .2s;display:flex;flex-direction:column}
.anime-card:active{transform:scale(.96);border-color:var(--border-b)}
.anime-poster{width:100%;aspect-ratio:2/3;background:var(--elevated);position:relative;overflow:hidden}
.anime-poster img{width:100%;height:100%;object-fit:cover;display:block}
.anime-poster-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--elevated),var(--surface));font-family:var(--font-d);font-size:28px;font-weight:700;color:var(--accent2);letter-spacing:2px;text-align:center;padding:10px}
.anime-score-badge{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.8);color:var(--warn);font-size:11px;font-weight:700;padding:3px 7px;border-radius:10px}
.anime-ep-badge{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,.75);color:var(--txt2);font-size:10px;padding:2px 6px;border-radius:6px}
.anime-card-body{padding:10px 12px;flex:1;display:flex;flex-direction:column;gap:4px}
.anime-card-title{font-size:13px;font-weight:600;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;color:var(--txt)}
.anime-card-meta{font-size:11px;color:var(--muted)}
.genre-tag{display:inline-block;background:var(--accent-glow);color:var(--accent2);border-radius:4px;font-size:10px;padding:2px 6px;margin-top:3px}

/* ANIME DETAIL */
.detail-topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.back-btn{background:none;border:none;color:var(--accent);font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);white-space:nowrap}
.ap-title-label{font-size:13px;color:var(--txt2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#anime-detail{display:flex;flex-direction:column;height:100%}
.detail-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.detail-hero{display:flex;gap:14px;padding:14px 16px}
.detail-poster{width:105px;height:148px;flex-shrink:0;border-radius:var(--r);overflow:hidden;background:var(--elevated)}
.detail-poster img{width:100%;height:100%;object-fit:cover}
.detail-poster-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:22px;font-weight:700;color:var(--accent2);letter-spacing:2px;text-align:center;padding:8px}
.detail-meta{flex:1}
.detail-title{font-family:var(--font-d);font-size:19px;font-weight:700;line-height:1.2;margin-bottom:7px}
.detail-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:7px}
.tag{background:var(--elevated);color:var(--txt2);border-radius:6px;font-size:11px;padding:3px 8px}
.tag.ac{background:var(--accent-glow);color:var(--accent2);border:1px solid var(--border-b)}
.detail-rating{color:var(--warn);font-size:14px;font-weight:700}
.detail-synopsis{padding:0 16px 12px;font-size:13px;color:var(--txt2);line-height:1.7}
.detail-synopsis-title{font-family:var(--font-d);font-size:14px;font-weight:600;color:var(--accent2);margin-bottom:7px;letter-spacing:1px}
.lang-row{padding:0 16px 12px}
.lang-row label{font-size:11px;color:var(--txt2);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.5px}
.lang-btns{display:flex;gap:6px;flex-wrap:wrap}
.lang-btn{background:var(--card);border:1px solid var(--border);color:var(--txt2);border-radius:6px;padding:7px 13px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:var(--font)}
.lang-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.ep-section{padding:0 16px 20px}
.ep-section-title{font-family:var(--font-d);font-size:16px;font-weight:600;color:var(--accent2);margin-bottom:10px;letter-spacing:1px}
.ep-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.ep-btn{background:var(--card);border:1px solid var(--border);color:var(--txt2);border-radius:var(--rs);padding:9px 2px;text-align:center;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:var(--font)}
.ep-btn:active,.ep-btn.playing{background:var(--accent);border-color:var(--accent);color:#fff}

/* ANIME PLAYER */
#anime-player-view{display:flex;flex-direction:column;height:100%}
.anime-video-wrap{position:relative;background:#000;width:100%;aspect-ratio:16/9;flex-shrink:0}
.anime-ep-info{padding:12px 16px;background:var(--card);flex-shrink:0}
.aei-title{font-family:var(--font-d);font-size:18px;font-weight:600;margin-bottom:3px}
.aei-sub{font-size:12px;color:var(--txt2)}
.aei-hint{margin-top:6px;font-size:11px;color:var(--muted);line-height:1.6}
.aei-link{color:var(--accent2)}
.ep-nav{display:flex;gap:8px;padding:10px 16px;flex-shrink:0}
.ep-nav-btn{flex:1;background:var(--elevated);border:1px solid var(--border);color:var(--txt2);border-radius:var(--rs);padding:9px;font-family:var(--font);font-size:13px;cursor:pointer;text-align:center;transition:all .2s}
.ep-nav-btn:active{background:var(--accent-glow);border-color:var(--border-b);color:var(--accent)}
.ep-nav-btn:disabled{opacity:.3;cursor:not-allowed}

/* TOAST */
.toast{position:fixed;bottom:calc(20px + var(--sb));left:50%;transform:translateX(-50%);background:var(--elevated);border:1px solid var(--border-b);color:var(--txt);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:999;max-width:92%;text-align:center;animation:tst .3s ease}
@keyframes tst{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-b);border-radius:3px}

/* Anime cover images */
.anime-thumb { position:relative; overflow:hidden; background:var(--elevated); aspect-ratio:2/3; width:100%; }
.anime-thumb img { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; }
.anime-thumb-fallback { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:700; color:var(--accent2); font-family:var(--font-d); background:var(--elevated); }
.anime-detail-thumb { position:relative; overflow:hidden; }
.anime-video-wrap { position:relative; background:#000; width:100%; aspect-ratio:16/9; margin-bottom:12px; border-radius:var(--radius); overflow:hidden; }
#anime-video-player, #anime-iframe { position:absolute; inset:0; width:100%; height:100%; }
#anime-player-loading { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; background:var(--bg-base); color:var(--text-muted); font-size:13px; }
.ep-open-btn { display:inline-block; background:var(--accent); color:#fff; border:none; border-radius:var(--radius-sm); padding:10px 18px; font-size:13px; font-family:var(--font-body); cursor:pointer; font-weight:600; text-decoration:none; text-align:center; }

/* Anime genre tag */
.anime-genre-tag{display:inline-block;background:var(--accent-glow);color:var(--accent2);border-radius:4px;font-size:10px;padding:2px 7px;margin-top:2px;font-weight:500}

/* ── Anime detail — spacious layout ────────────────────── */
#anime-detail{padding:0;overflow-y:auto}
.detail-cover-wrap{position:relative;width:100%;aspect-ratio:2/3;max-height:340px;overflow:hidden;background:var(--elevated)}
.detail-cover-img{width:100%;height:100%;object-fit:cover;display:block}
.detail-cover-gradient{position:absolute;inset:0;background:linear-gradient(to top,rgba(13,13,26,1) 0%,rgba(13,13,26,0.5) 50%,transparent 100%)}
.detail-cover-info{position:absolute;bottom:0;left:0;right:0;padding:16px}
.detail-title{font-family:var(--font-d);font-size:22px;font-weight:700;color:#fff;line-height:1.2;margin-bottom:8px;text-shadow:0 2px 8px rgba(0,0,0,.8)}
.detail-badges{display:flex;flex-wrap:wrap;gap:5px}
.dbadge{background:rgba(0,0,0,.6);color:#fff;border-radius:6px;font-size:11px;padding:3px 8px;font-weight:500;backdrop-filter:blur(4px)}
.dbadge.yellow{color:var(--warn);background:rgba(0,0,0,.7)}
.dbadge.accent{color:var(--accent2);background:rgba(139,92,246,.25);border:1px solid rgba(139,92,246,.4)}
.detail-section{padding:16px 16px 4px}
.detail-section-title{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.detail-lang-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.detail-synopsis{font-size:14px;line-height:1.75;color:var(--txt2);background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border)}
.ep-grid-new{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;padding-bottom:16px}
.ep-btn{background:var(--card);border:1px solid var(--border);color:var(--txt2);border-radius:8px;padding:11px 4px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;font-family:var(--font)}
.ep-btn:active,.ep-btn.playing{background:var(--accent);border-color:var(--accent);color:#fff}
/* Player fallback */
.ep-fallback{display:flex;flex-direction:column;gap:10px;margin-top:10px}
.ep-fallback p{font-size:13px;color:var(--txt2);line-height:1.6}
.ep-open-btn{display:block;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px 18px;font-size:14px;font-family:var(--font);font-weight:600;cursor:pointer;text-decoration:none;text-align:center}
.ep-open-alt{background:var(--elevated);color:var(--accent2);border:1px solid var(--border-b)}

/* ── ESPN Match Cards ─────────────────────────────────── */
.league-group-header{padding:14px 16px 6px;font-family:var(--font-d);font-size:13px;font-weight:700;color:var(--accent2);letter-spacing:1px;text-transform:uppercase;border-top:1px solid var(--border);margin-top:4px}
.league-group-header:first-child{border-top:none;margin-top:0}
.match-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin:0 16px 8px;transition:border-color .2s}
.match-card.live{border-color:var(--live-red);background:rgba(239,68,68,.04)}
.match-card.finished{opacity:.8}
.mc-row{display:flex;align-items:center;gap:8px}
.mc-team{flex:1;display:flex;align-items:center;gap:8px;min-width:0}
.mc-team-away{flex-direction:row-reverse}
.mc-logo{width:28px;height:28px;object-fit:contain;flex-shrink:0}
.mc-name{font-size:13px;font-weight:600;line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mc-center{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;min-width:80px}
.mc-score{font-family:var(--font-d);font-size:24px;font-weight:700;color:var(--txt);line-height:1}
.mc-dash{margin:0 4px;color:var(--muted)}
.mc-time-cl{font-size:13px;font-weight:700;color:var(--accent2);background:var(--accent-glow);border:1px solid var(--border-b);padding:4px 10px;border-radius:6px;white-space:nowrap}
.mc-status{font-size:10px;margin-top:2px;text-align:center}
.mc-status-done{color:var(--muted)}
.mc-status-pre{color:var(--txt2)}
.mc-footer{margin-top:10px;padding-top:8px;border-top:1px solid var(--border);display:flex;justify-content:flex-end}
.btn-reminder{background:none;border:1px solid var(--border-b);color:var(--accent);border-radius:6px;font-size:11px;padding:5px 12px;cursor:pointer;font-family:var(--font);transition:all .2s;white-space:nowrap}
.btn-reminder.set{color:var(--success);border-color:var(--success)}

/* ── Watch History ─────────────────────────────────────── */
.history-section{padding:14px 16px 4px}
.history-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.history-header h3{font-family:var(--font-d);font-size:16px;font-weight:600;color:var(--accent2);letter-spacing:1px}
.history-clear{background:none;border:1px solid var(--border);color:var(--muted);border-radius:6px;font-size:11px;padding:4px 10px;cursor:pointer;font-family:var(--font)}
.history-card{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.history-card:active{border-color:var(--border-b)}
.history-thumb{width:52px;height:74px;flex-shrink:0;border-radius:6px;overflow:hidden;background:var(--elevated)}
.history-info{flex:1;min-width:0}
.history-title{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.history-ep{font-size:11px;color:var(--muted);margin-bottom:6px}
.history-bar-wrap{background:var(--elevated);border-radius:4px;height:3px;width:100%}
.history-bar{background:var(--accent);height:3px;border-radius:4px;transition:width .3s}
.history-play{background:var(--accent);border:none;border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;color:#fff;font-size:13px}

/* ── Episode player extras ─────────────────────────────── */
.ep-provider-row{display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.provider-btn{background:var(--card);border:1px solid var(--border);color:var(--txt2);border-radius:6px;padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .2s}
.provider-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.ep-open-row{margin-top:8px}
.ep-ext-link{color:var(--accent2);font-size:12px;text-decoration:none}
.ep-ext-link:hover{text-decoration:underline}

/* ── Anime video iframe fix ────────────────────────────── */
#anime-iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:none}

function chileTime(utcStr) {
  if (!utcStr) return null;
  try {
    const d = new Date(utcStr);
    return new Intl.DateTimeFormat('es-CL', {
      timeZone: 'America/Santiago',
      hour: '2-digit', minute: '2-digit', hour12: false
    }).format(d);
  } catch { return null; }
}

async function fetchMatches() {
  const container = document.getElementById('matches-container');
  container.innerHTML = '<div class="loading-matches"><div class="spinner"></div><p>Cargando partidos del día...</p></div>';

  // Fetch all leagues in parallel
  const results = await Promise.allSettled(
    ESPN_LEAGUES.map(lg =>
      fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${lg.slug}/scoreboard`)
        .then(r => r.ok ? r.json() : null)
        .then(d => ({ lg, events: d ? (d.events || []) : [] }))
        .catch(() => ({ lg, events: [] }))
    )
  );

  // Group by league, only leagues that have events TODAY
  const grouped = [];
  for (const res of results) {
    if (res.status !== 'fulfilled') continue;
    const { lg, events } = res.value;
    if (!events.length) continue;
    grouped.push({ lg, events });
  }

  if (!grouped.length) {
    container.innerHTML = noMatchesHTML(false);
    return;
  }

  allMatches = grouped;
  renderMatchesESPN(grouped);
}

// No filter buttons — just render all leagues that have games today
function renderMatchesESPN(grouped) {
  const container = document.getElementById('matches-container');
  document.getElementById('league-filter-bar').style.display = 'none';

  // Get today's date in Chile timezone
  const todayCL = new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Santiago' }).format(new Date());

  let html = '';
  let totalShown = 0;

  for (const { lg, events } of grouped) {
    // Filter to ONLY events happening today in Chile time
    const todayEvents = events.filter(evt => {
      const comp = (evt.competitions || [])[0] || {};
      if (!comp.date) return false;
      const evtDateCL = new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Santiago' }).format(new Date(comp.date));
      return evtDateCL === todayCL;
    });

    if (!todayEvents.length) continue;

    html += `<div class="league-group-header">${lg.flag} ${lg.name}</div>`;
    for (const evt of todayEvents) {
      html += buildESPNMatchCard(evt);
      totalShown++;
    }
  }

  container.innerHTML = totalShown > 0 ? html : noMatchesHTML(false);
}

function buildESPNMatchCard(evt) {
  const comp   = (evt.competitions || [])[0] || {};
  const teams  = comp.competitors || [];
  const home   = teams.find(t => t.homeAway === 'home') || teams[0] || {};
  const away   = teams.find(t => t.homeAway === 'away') || teams[1] || {};

  const homeName  = (home.team || {}).shortDisplayName || (home.team || {}).displayName || '?';
  const awayName  = (away.team || {}).shortDisplayName || (away.team || {}).displayName || '?';
  const homeLogo  = (home.team || {}).logo || '';
  const awayLogo  = (away.team || {}).logo || '';
  const homeScore = home.score !== undefined ? home.score : '';
  const awayScore = away.score !== undefined ? away.score : '';

  const statusType = (comp.status || {}).type || {};
  const state      = statusType.state || 'pre';
  const detail     = statusType.shortDetail || statusType.detail || '';
  const isLive     = state === 'in';
  const isDone     = state === 'post';
  const isPre      = state === 'pre';

  const timeDisplay = isPre && comp.date ? (chileTime(comp.date) || detail) : detail;

  const matchId = comp.id || evt.id || '';

  const scoreOrTime = (isLive || isDone)
    ? `<div class="mc-score">${homeScore}<span class="mc-dash"> - </span>${awayScore}</div>`
    : `<div class="mc-time-cl">${timeDisplay}</div>`;

  const statusLine = isLive
    ? `<span class="live-badge">EN VIVO · ${detail}</span>`
    : isDone
      ? `<span class="mc-done">Finalizado</span>`
      : `<span class="mc-pre">🕐 ${timeDisplay} (Chile)</span>`;

  const isSet = reminderSet.has(matchId);
  const reminderHtml = isPre && matchId ? `
    <div class="mc-footer">
      <button class="btn-reminder${isSet?' set':''}" id="rbtn-${matchId}"
        data-match-id="${matchId}" data-home="${homeName}" data-away="${awayName}" data-time="${timeDisplay}"
        onclick="setReminderFromBtn(this)">
        ${isSet ? '✓ Activado' : '🔔 Recordarme'}
      </button>
    </div>` : '';

  return `
  <div class="match-card${isLive?' live':''}${isDone?' finished':''}">
    <div class="mc-row">
      <div class="mc-team">
        ${homeLogo?`<img class="mc-logo" src="${homeLogo}" onerror="this.style.display='none'">` : ''}
        <span class="mc-name">${homeName}</span>
      </div>
      <div class="mc-center">
        ${scoreOrTime}
        <div class="mc-status-line">${statusLine}</div>
      </div>
      <div class="mc-team mc-team-away">
        <span class="mc-name">${awayName}</span>
        ${awayLogo?`<img class="mc-logo" src="${awayLogo}" onerror="this.style.display='none'">` : ''}
      </div>
    </div>
    ${reminderHtml}
  </div>`;
}

function buildMatchCard(e) {
  const isLive = ['1H','2H','HT','ET','PEN'].includes(e.strStatus);
  const isFinished = ['FT','AET','PEN_FT'].includes(e.strStatus);
  const isUpcoming = !isLive && !isFinished;

  const timeStr = chileTime(e.strTimestamp) || e.strTime || '—';
  const hasScore = e.intHomeScore !== null && e.intHomeScore !== '';
  const score = hasScore
    ? `<span style="font-size:22px;font-weight:700;font-family:var(--font-display)">${e.intHomeScore}&nbsp;-&nbsp;${e.intAwayScore}</span>`
    : `<span style="font-size:13px;color:var(--text-muted)">${timeStr}</span>`;
  const statusLine = isLive
    ? `<span style="color:var(--live-red);font-size:10px;font-weight:700">⬤ ${e.strStatus||'VIVO'}</span>`
    : isFinished
      ? `<span style="color:var(--text-muted);font-size:10px">Finalizado</span>`
      : `<span style="color:var(--accent-2);font-size:10px">🕐 ${timeStr} (Chile)</span>`;

  const reminderBtn = isUpcoming ? buildReminderBtn(e, timeStr) : '';

  return `
  <div class="match-card ${isLive?'live':''} ${isFinished?'finished':''}">
    <div class="match-league">
      ${e.strLeague||'Fútbol'}
      ${e.strCountry?`<span style="color:var(--text-muted);margin-left:4px">· ${e.strCountry}</span>`:''}
      ${isLive?'<span class="live-badge">EN VIVO</span>':''}
    </div>
    <div class="match-teams">
      <div class="team-side">
        <div class="team-name">${e.strHomeTeam||''}</div>
      </div>
      <div class="match-score">
        ${score}
        <div class="score-time">${statusLine}</div>
      </div>
      <div class="team-side right">
        <div class="team-name">${e.strAwayTeam||''}</div>
      </div>
    </div>
    <div class="match-footer">${reminderBtn}</div>
  </div>`;
}

function setReminder(id, home, away, timeStr) {
  const btn = document.getElementById('rbtn-' + id);
  if (reminderSet.has(id)) { showToast('Recordatorio ya activado ✓'); return; }
  if (!timeStr || timeStr === '—') { showToast('Hora del partido no disponible'); return; }

  // Parse HH:MM Chile time
  const parts = timeStr.split(':');
  if (parts.length < 2) { showToast('Hora inválida'); return; }
  const h = parseInt(parts[0], 10);
  const m = parseInt(parts[1], 10);
  const nowCL = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Santiago' }));
  const matchCL = new Date(nowCL);
  matchCL.setHours(h, m - 5, 0, 0);
  // If time already passed today, try adding it to tomorrow context
  let delay = matchCL.getTime() - nowCL.getTime();
  if (delay < 0) { showToast('El partido ya comenzó o está muy próximo'); return; }

  reminderSet.add(id);
  if (btn) { btn.classList.add('set'); btn.textContent = '✓ Activado'; }

  // iOS Safari doesn't support Notifications in PWA — use visible alert fallback
  const doAlert = () => {
    alert('MultiPlay: ' + home + ' vs ' + away + ' - partido en 5 min - ' + timeStr + ' Chile');
  };

  if ('Notification' in window && Notification.permission === 'granted') {
    setTimeout(() => {
      new Notification('⚽ MultiPlay — 5 min para el partido', {
        body: home + ' vs ' + away + '  ·  ' + timeStr + ' (Chile)',
        icon: 'https://bpedrazav.github.io/multiplaayy/icons/icon-192.png'
      });
    }, delay);
    showToast('🔔 Recordatorio activado — ' + timeStr + ' (Chile)');
  } else if ('Notification' in window && Notification.permission !== 'denied') {
    Notification.requestPermission().then(p => {
      if (p === 'granted') {
        setTimeout(() => {
          new Notification('⚽ MultiPlay — 5 min para el partido', {
            body: home + ' vs ' + away + '  ·  ' + timeStr + ' (Chile)',
            icon: 'https://bpedrazav.github.io/multiplaayy/icons/icon-192.png'
          });
        }, delay);
      } else {
        // iOS fallback: schedule a visible alert
        setTimeout(doAlert, delay);
      }
    });
    showToast('🔔 Recordatorio activado — ' + timeStr + ' (Chile)');
  } else {
    // iOS PWA fallback: visible alert
    setTimeout(doAlert, delay);
    showToast('🔔 Recordatorio activado — ' + timeStr + ' (Chile)');
  }
}
window.setReminder = setReminder;

  if (eid) {
    const i = channels.findIndex(c => c.id === eid);
    if (i > -1) channels[i] = { id:eid, name, url, logo: logo||name.slice(0,6).toUpperCase() };
    showToast('✅ Canal actualizado');
    cancelEdit();
  } else {
    channels.push({ id: Date.now().toString(), name, url, logo: logo||name.slice(0,6).toUpperCase() });
    document.getElementById('ch-name').value = '';
    document.getElementById('ch-url').value = '';
    document.getElementById('ch-logo').value = '';
    showToast('✅ Canal guardado');
  }
  persistChannels();
  renderChannelsList();
  renderSettingsChannels();
}
window.saveChannel = saveChannel;

function cancelEdit() {
  document.getElementById('ch-edit-id').value = '';
  ['ch-name','ch-url','ch-logo'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('btn-cancel-edit').style.display = 'none';
  document.getElementById('btn-save-channel').textContent = '💾 Guardar Canal';
  document.getElementById('form-title').textContent = '➕ Agregar Canal';
}
window.cancelEdit = cancelEdit;

function editChannel(id) {
  const ch = channels.find(c => c.id === id);
  if (!ch) return;
  document.getElementById('ch-edit-id').value = ch.id;
  document.getElementById('ch-name').value = ch.name;
  document.getElementById('ch-url').value = ch.url;
  document.getElementById('ch-logo').value = ch.logo || '';
  document.getElementById('btn-cancel-edit').style.display = 'inline-block';
  document.getElementById('btn-save-channel').textContent = '💾 Actualizar';
  document.getElementById('form-title').textContent = '✏️ Editar: ' + ch.name;
  switchIPTV('ajustes');
  showToast('Editando: ' + ch.name);
}
window.editChannel = editChannel;

function copyChannelUrl(id) {
  const ch = channels.find(c => c.id === id);
  if (!ch) return;
  const copy = () => {
    const ta = document.createElement('textarea');
    ta.value = ch.url; ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    showToast('📋 URL copiada');
  };
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(ch.url).then(() => showToast('📋 URL copiada')).catch(copy);
  } else copy();
}
window.copyChannelUrl = copyChannelUrl;

function deleteChannel(id) {
  if (!confirm('¿Eliminar este canal?')) return;
  channels = channels.filter(c => c.id !== id);
  persistChannels(); renderChannelsList(); renderSettingsChannels();
  showToast('Canal eliminado');
}
window.deleteChannel = deleteChannel;

function filterChannels(q) { renderChannelsList(q.toLowerCase()); }
window.filterChannels = filterChannels;

function renderChannelsList(filter = '') {
  const list = document.getElementById('channels-list');
  const empty = document.getElementById('no-channels');
  const show = filter ? channels.filter(c => c.name.toLowerCase().includes(filter)) : channels;
  if (!show.length) { list.innerHTML=''; empty.style.display='flex'; return; }
  empty.style.display = 'none';
  list.innerHTML = show.map(ch => `
    <div class="channel-card">
      <div class="channel-logo-box">${ch.logo||ch.name.slice(0,6)}</div>
      <div class="channel-info" onclick="playChannel('${ch.id}')" style="cursor:pointer">
        <div class="channel-name">${ch.name}</div>
        <div class="channel-url">${ch.url}</div>
      </div>
      <button class="btn-play-ch" onclick="playChannel('${ch.id}')">▶</button>
    </div>`).join('');
}

function renderSettingsChannels() {
  const list = document.getElementById('settings-channels-list');
  const hint = document.getElementById('no-saved-channels');
  if (!channels.length) { list.innerHTML=''; hint.style.display='block'; return; }
  hint.style.display = 'none';
  list.innerHTML = channels.map(ch => `
    <div class="settings-ch-item">
      <div class="settings-ch-name" title="${ch.url}">${ch.name}</div>
      <button class="icon-btn" onclick="editChannel('${ch.id}')" title="Editar">✏️</button>
      <button class="icon-btn" onclick="copyChannelUrl('${ch.id}')" title="Copiar URL">📋</button>
      <button class="icon-btn" onclick="deleteChannel('${ch.id}')" title="Eliminar">🗑️</button>
    </div>`).join('');
}

function playChannel(id) {
  const ch = channels.find(c => c.id === id);
  if (!ch) return;
  switchTab('iptv'); switchIPTV('player');
  const video = document.getElementById('iptv-video');
  const ph = document.getElementById('player-placeholder');
  const np = document.getElementById('now-playing');
  const err = document.getElementById('player-error');
  ph.style.display='none'; err.style.display='none';
  np.style.display='flex';
  document.getElementById('np-logo').textContent = ch.logo||ch.name.slice(0,6);
  document.getElementById('np-name').textContent = ch.name;
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance=null; }
  video.src='';

  const start = () => {
    if (window.Hls && Hls.isSupported()) {
      hlsInstance = new Hls({ enableWorker:false, lowLatencyMode:true });
      hlsInstance.loadSource(ch.url);
      hlsInstance.attachMedia(video);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => video.play().catch(()=>{}));
      hlsInstance.on(Hls.Events.ERROR, (_, d) => { if (d.fatal) err.style.display='block'; });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src=ch.url; video.play().catch(()=>{});
    } else { err.style.display='block'; }
  };

  window.Hls ? start() : setTimeout(start, 800);
}
window.playChannel = playChannel;

function stopIPTV() {
  const v = document.getElementById('iptv-video');
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance=null; }
  v.pause(); v.src='';
  document.getElementById('player-placeholder').style.display='flex';
  document.getElementById('now-playing').style.display='none';
  document.getElementById('player-error').style.display='none';
}
window.stopIPTV = stopIPTV;

// ─── Watch History ────────────────────────────────────────────────────────────
function saveWatchHistory(anime, ep) {
  try {
    let history = JSON.parse(localStorage.getItem('mp_history') || '{}');
    history[anime.id] = {
      animeId:   anime.id,
      title:     anime.title,
      cover:     anime.cover,
      ep:        ep,
      eps:       anime.eps,
      timestamp: Date.now()
    };
    localStorage.setItem('mp_history', JSON.stringify(history));
    renderWatchHistory();
  } catch(e) {}
}

function getWatchHistory() {
  try { return Object.values(JSON.parse(localStorage.getItem('mp_history') || '{}')); }
  catch(e) { return []; }
}

function renderWatchHistory() {
  const container = document.getElementById('watch-history-list');
  if (!container) return;
  const history = getWatchHistory()
    .sort((a, b) => b.timestamp - a.timestamp)
    .slice(0, 20);

  if (!history.length) {
    container.innerHTML = '<p class="empty-hint" style="padding:16px">Aún no has visto ningún episodio.</p>';
    return;
  }

  container.innerHTML = history.map(h => `
    <div class="history-card" onclick="resumeAnime(${h.animeId}, ${h.ep})">
      <div class="history-thumb">
        <img src="${h.cover}" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover">
      </div>
      <div class="history-info">
        <div class="history-title">${h.title}</div>
        <div class="history-ep">Episodio ${h.ep} de ${h.eps}</div>
        <div class="history-bar-wrap">
          <div class="history-bar" style="width:${Math.round((h.ep/h.eps)*100)}%"></div>
        </div>
      </div>
      <button class="history-play">▶</button>
    </div>`).join('');
}

function resumeAnime(animeId, ep) {
  showAnimeDetail(animeId);
  // Slight delay to let detail render
  setTimeout(() => playAnime(animeId, ep), 100);
}
window.resumeAnime = resumeAnime;

function clearHistory() {
  if (!confirm('¿Borrar todo el historial?')) return;
  localStorage.removeItem('mp_history');

  showToast('Historial borrado');
}
window.clearHistory = clearHistory;

function switchProvider(provider, animeId, ep, btn) {

    url = `https://anitaku.pe/${anime.gogoId}-episode-${ep}`;

async function playAnime(animeId, ep) {
  const anime = ANIME_DB.find(a => a.id === animeId);
  if (!anime) return;

  document.getElementById('anime-detail').style.display   = 'none';
  document.getElementById('anime-player-view').style.display = 'block';

  const epInfoEl  = document.getElementById('anime-episode-info');
  const loadingEl = document.getElementById('anime-player-loading');
  const videoEl   = document.getElementById('anime-video-player');
  const iframeEl  = document.getElementById('anime-iframe');
  const statusEl  = document.getElementById('player-status');

  // Reset
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  videoEl.style.display  = 'none';
  iframeEl.style.display = 'none';
  iframeEl.src           = '';
  if (loadingEl) loadingEl.style.display = 'flex';

  const isDub     = selectedLang === 'dub';
  const gogoId    = isDub ? (anime.gogoId + '-dub') : anime.gogoId;
  const epSlug    = gogoId + '-episode-' + ep;
  const langLabel = { sub:'Japonés + Sub', dub:'Inglés Doblado', esp:'Español Latino' }[selectedLang] || 'Sub';

  // Save history immediately
  saveWatchHistory(anime, ep);

  // Update episode info section
  epInfoEl.innerHTML = `
    <div class="ep-info-title">${anime.title} — Episodio ${ep}</div>
    <div class="ep-info-sub">${langLabel} · ${anime.year}</div>
    <div id="player-status-text" class="ep-info-hint">⏳ Conectando...</div>`;

  const setStatus = (msg) => {
    const el = document.getElementById('player-status-text');
    if (el) el.textContent = msg;
    if (statusEl) statusEl.textContent = msg;
  };

  const showFallback = () => {
    if (loadingEl) loadingEl.style.display = 'none';
    const anitakuUrl = 'https://anitaku.pe/' + epSlug;
    const hiAnimeUrl = 'https://hianime.to/watch/' + anime.gogoId + '-episode-' + ep;
    epInfoEl.innerHTML += `
      <div class="ep-fallback" style="margin-top:12px">
        <p style="font-size:12px;color:var(--muted);margin-bottom:8px">
          Abre el episodio sin anuncios:
        </p>
        <a href="${anitakuUrl}" target="_blank" class="ep-open-btn">▶ Anitaku</a>
        <a href="${hiAnimeUrl}" target="_blank" class="ep-open-btn ep-open-alt" style="margin-top:6px">▶ HiAnime</a>
      </div>`;
  };

  // Check cache first
  const cacheKey = epSlug;
  let sources = animeEpisodeCache[cacheKey] || [];

  if (!sources.length) {
    setStatus('⏳ Buscando fuente de video...');
    try {
      const controller = new AbortController();
      const timeoutId  = setTimeout(() => controller.abort(), 25000);

      const resp = await fetch(
        ANIME_SERVER + '/anime/watch/' + encodeURIComponent(epSlug),
        { signal: controller.signal }
      );
      clearTimeout(timeoutId);

      if (resp.ok) {
        const data = await resp.json();
        sources = data.sources || [];
        if (sources.length) {
          animeEpisodeCache[cacheKey] = sources;
          console.log('Sources found:', sources.length, sources.map(s => s.quality));
        }
      }
    } catch(e) {
      console.log('Fetch error:', e.message);
    }
  }

  if (!sources.length) {
    setStatus('❌ Sin fuente disponible');
    showFallback();
    return;
  }

  // Pick best quality
  const best = sources.find(s => s.quality === '1080p') ||
               sources.find(s => s.quality === '720p')  ||
               sources.find(s => s.quality === '480p')  ||
               sources[0];

  // Proxy URL so HLS.js can access it cross-origin
  const proxyUrl = ANIME_SERVER + '/proxy?url=' + encodeURIComponent(best.url);

  setStatus('✅ Cargando video...');
  if (loadingEl) loadingEl.style.display = 'none';
  videoEl.style.display = 'block';

  const tryPlay = (src, fallbackSrc) => {
    if (window.Hls && Hls.isSupported()) {
      if (hlsInstance) hlsInstance.destroy();
      hlsInstance = new Hls({
        enableWorker: true,
        lowLatencyMode: false,
        maxBufferLength: 60,
        maxMaxBufferLength: 120,
        startLevel: -1  // auto quality
      });
      hlsInstance.loadSource(src);
      hlsInstance.attachMedia(videoEl);
      hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
        videoEl.play().catch(() => {});
        setStatus('▶ Reproduciendo · ' + (best.quality || 'Auto'));
      });
      hlsInstance.on(Hls.Events.ERROR, (_, d) => {
        if (d.fatal) {
          console.log('HLS fatal error, trying fallback:', d.type, d.details);
          if (fallbackSrc && src !== fallbackSrc) {
            hlsInstance.destroy();
            tryPlay(fallbackSrc, null);
          } else {
            videoEl.style.display = 'none';
            setStatus('❌ Error de reproducción');
            showFallback();
          }
        }
      });
    } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
      // Native HLS on Safari/iOS
      videoEl.src = src;
      videoEl.play().catch(() => {});
      setStatus('▶ Reproduciendo en Safari');
    } else {
      videoEl.style.display = 'none';
      setStatus('❌ Tu navegador no soporta HLS');
      showFallback();
    }
  };

  // Try proxied URL first, fallback to direct URL
  tryPlay(proxyUrl, best.url);
}

function showFallbackLinks(anime, ep) {
  const epInfoEl = document.getElementById('anime-episode-info');
  const extra = `
    <div class="ep-fallback" style="margin-top:12px">
      <p style="font-size:12px;color:var(--muted);margin-bottom:8px">Abre el episodio en tu navegador:</p>
      <a href="https://anitaku.pe/${anime.gogoId}-episode-${ep}" target="_blank" class="ep-open-btn">▶ Anitaku (sin popup ads)</a>
      <a href="https://hianime.to/watch/${anime.gogoId}-episode-${ep}" target="_blank" class="ep-open-btn ep-open-alt" style="margin-top:6px">▶ HiAnime</a>
    </div>`;
  const existing = document.getElementById('player-status');
  if (existing) existing.insertAdjacentHTML('afterend', extra);
}

function switchQuality(encodedUrl, btn) {
  const url = decodeURIComponent(encodedUrl);
  document.querySelectorAll('.provider-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
  const videoEl   = document.getElementById('anime-video-player');
  const proxyUrl  = `${ANIME_SERVER}/proxy?url=${encodedUrl}`;
  if (window.Hls && Hls.isSupported()) {
    hlsInstance = new Hls({ enableWorker: false });
    hlsInstance.loadSource(proxyUrl);
    hlsInstance.attachMedia(videoEl);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => videoEl.play().catch(()=>{}));
    hlsInstance.on(Hls.Events.ERROR, (_, d) => {
      if (d.fatal) { hlsInstance.destroy(); hlsInstance = new Hls(); hlsInstance.loadSource(url); hlsInstance.attachMedia(videoEl); }
    });
  } else if (videoEl.canPlayType('application/vnd.apple.mpegurl')) {
    videoEl.src = proxyUrl;
    videoEl.play().catch(() => { videoEl.src = url; videoEl.play().catch(()=>{}); });
  }
}
window.switchQuality = switchQuality;
window.playAnime = playAnime;

  document.getElementById('anime-browse').style.display='block';

window.backToDetail = backToDetail;
